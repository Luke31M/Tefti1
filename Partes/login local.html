<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Acceso para Locales - TEFTI</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        body {
            background-color: #F8F9FA; /* Fondo característico TEFTI */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            box-sizing: border-box;
        }

        .login-container {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 6px solid #27ae60;
        }

        .login-title {
            color: #27ae60;
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }

        .login-subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #27ae60;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            box-sizing: border-box;
            background-color: #f8f9fa;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2ecc71;
            box-shadow: 0 0 0 4px rgba(139, 195, 74, 0.15);
            background-color: #fff;
        }

        .btn-tefti-solido {
            width: 100%;
            padding: 14px;
            border: none;
            background-color: #27ae60;
            color: white;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 15px;
        }

        .btn-tefti-solido:hover {
            background-color: #1e8449;
        }

        .btn-tefti-solido:active {
            transform: scale(0.98);
        }

        .register-link {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #555;
            line-height: 1.6;
        }

        .register-link a {
            color: #27ae60;
            font-weight: bold;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2 class="login-title">TEFTI Negocios</h2>
        <p class="login-subtitle">Accede al panel administrativo de tu local</p>
        
        <form id="form-login-local" onsubmit="iniciarSesionLocal(event)">
            <div class="form-group">
                <label for="correo-local">Correo Electrónico (Propietario)</label>
                <input type="email" id="correo-local" placeholder="tucorreo@negocio.com" required>
            </div>
            
            <div class="form-group">
                <label for="password-local">Contraseña</label>
                <input type="password" id="password-local" placeholder="Ingresa tu clave de acceso" required>
            </div>
            
            <button type="submit" class="btn-tefti-solido">Iniciar Sesión</button>
        </form>

        <div class="register-link">
            ¿Eres un local nuevo y quieres formar parte? <br>
            <a href="registroLocatario.html">Comenzar registro de local</a>
            
            <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;">
                <a href="app.html" style="color: #888; font-weight: normal; font-size: 0.85rem; text-decoration: none;">← Volver al menú principal (Turistas)</a>
            </div>
        </div>
    </div>

    <script>
        async function iniciarSesionLocal(event) {
            event.preventDefault(); 
            
            const correo = document.getElementById('correo-local').value;
            const password = document.getElementById('password-local').value;

            if (correo && password) {
                try {
                    const response = await fetch('/api/negocios/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ correo, password })
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        localStorage.setItem('tefti_sesion_local', 'activa');
                        localStorage.setItem('tefti_correo_local', data.correo);
                        localStorage.setItem('tefti_nombre_local', data.nombre);
                        
                        // Limpiar sesión de turista para evitar conflictos de Navbar
                        localStorage.removeItem('tefti_sesion');
                        localStorage.removeItem('tefti_correo_usuario');
                        
                        alert('¡Bienvenido a tu panel administrativo, logeado como: ' + data.nombre + '!');
                        window.location.href = 'PanelLocal.html'; 
                    } else {
                        const errData = await response.json();
                        alert('Error de inicio de sesión: ' + (errData.error || 'Credenciales incorrectas'));
                    }
                } catch (error) {
                    console.error("Error al conectar con la base de datos:", error);
                    alert('No se pudo contactar con la base de datos. Verifica que el servidor (NodeJS) esté encendido.');
                }
            }
        }
    </script>
</body>
</html>
