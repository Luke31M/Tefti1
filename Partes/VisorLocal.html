<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Local - TEFTI</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@300;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">

    <style>
        :root {
            --primary-color: #006847;
            --bg-color: #f8f9fa;
        }

        body.dark-mode {
            --bg-color: #121212;
            --primary-color: #2ecc71;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            font-family: 'Poppins', sans-serif;
            overflow-y: auto !important;
            /* Forzar scroll vertical */
            height: auto !important;
            /* Permitir que el body crezca */
        }

        html {
            overflow-y: auto !important;
            height: auto !important;
        }

        .visor-container {
            max-width: 1000px;
            margin: 100px auto 60px auto;
            padding: 30px;
            padding-bottom: 100px;
            /* Espacio extra abajo */
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 10;
        }

        body.dark-mode .visor-container {
            background: #1e1e1e;
            color: #eee;
        }

        .portada-local {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .info-pill {
            display: inline-block;
            background: #eee;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-right: 10px;
            margin-bottom: 10px;
            color: #333;
            font-weight: 500;
        }

        body.dark-mode .info-pill {
            background: #333;
            color: #ccc;
        }

        .btn-volver {
            display: inline-block;
            padding: 10px 20px;
            background-color: #444;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-volver:hover {
            background-color: #222;
            transform: translateX(-3px);
        }

        .btn-green {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-green:hover {
            background-color: #218838;
        }

        .resena-card {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            background: #fff;
        }

        body.dark-mode .resena-card {
            border-color: #444;
            background: #2a2a2a;
        }

        .resena-respuesta {
            margin-top: 15px;
            padding: 15px;
            border-left: 4px solid #28a745;
            background: rgba(40, 167, 69, 0.05);
            color: #27ae60;
            font-size: 0.95rem;
            font-style: italic;
            border-radius: 0 8px 8px 0;
        }

        /* --- VITRINA DE PRODUCTOS --- */
        .productos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .producto-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            border: 1px solid #eee;
            transition: transform 0.3s;
        }

        .producto-card:hover {
            transform: translateY(-5px);
        }

        .producto-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .producto-info {
            padding: 15px;
        }

        .producto-nombre {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .producto-precio {
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1rem;
        }

        body.dark-mode .producto-card {
            background: #2a2a2a;
            border-color: #444;
        }

        body.dark-mode .producto-nombre {
            color: white;
        }

        /* --- ESTRELLAS DORADAS --- */
        .stars-container {
            display: flex;
            gap: 5px;
            margin: 10px 0;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .star {
            color: #ccc;
            transition: 0.2s;
        }

        .star.selected,
        .star:hover {
            color: #FFD700;
            /* Dorado */
        }

        .star-display {
            color: #FFD700;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
    </style>
</head>

<body>

    <script src="config.js"></script>
    <div id="navbar-container"></div>

    <div class="visor-container" id="visor-content">
        <a href="Locales.html" class="btn-volver">← Volver al Catálogo</a>

        <div id="loading" style="text-align: center; padding: 50px;">
            <h2>Cargando la información del Local...</h2>
        </div>

        <div id="local-details" style="display: none;">
            <img id="img-local" class="portada-local" src=""
                onerror="this.src='https://images.unsplash.com/photo-1544025162-81111054378f?auto=format&fit=crop&q=80&w=1000';">

            <h1 id="titulo-local">Nombre del Local</h1>

            <div style="margin-bottom: 20px;">
                <span class="info-pill">🏷️ <span id="cat-local">Categoría</span></span>
                <span class="info-pill">📍 <span id="dir-local">Dirección</span></span>
                <span class="info-pill">📞 <span id="tel-local">Teléfono</span></span>
                <span class="info-pill" style="position: relative; cursor: help;" onclick="toggleHorariosDetalle()">
                    ⏰ <span id="horario-local">Horario</span>
                    <div id="horarios-detalle" style="display: none; position: absolute; top: 110%; left: 0; background: white; border: 1px solid #ddd; padding: 15px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); z-index: 100; width: 220px; color: #333;">
                        <h4 style="margin: 0 0 10px 0; font-size: 0.9rem; color: var(--primary-color);">Horarios de la semana</h4>
                        <div id="lista-horarios-semana" style="font-size: 0.8rem; line-height: 1.6;"></div>
                    </div>
                </span>
            </div>

            <p id="desc-local" style="font-size: 1.15rem; line-height: 1.8; margin: 30px 0; color: #555;"></p>

            <!-- SECCIÓN DE OFERTAS Y PROMOCIONES -->
            <div id="seccion-ofertas" style="display:none; margin: 40px 0;">
                <h2 style="color: #333; margin-bottom: 20px; display:flex; align-items:center; gap:10px; font-size: 1.5rem;">
                    <span style="background: var(--primary-color); color: white; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 1.2rem;">🏷️</span>
                    Ofertas Exclusivas
                    <span style="background:#2ecc71; color:white; font-size:0.65rem; border-radius:6px; padding:3px 8px; font-weight:800; letter-spacing: 0.5px;">TOP PROMOS</span>
                </h2>
                <div id="contenedor-ofertas" style="display:flex; flex-wrap:wrap; gap:20px;"></div>
            </div>

            <div id="seccion-menu"
                style="display: none; background: #fff; padding: 25px; border-radius: 12px; margin: 30px 0; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee;">
                <h2 style="color: var(--primary-color); margin-top: 0;">🛍️ Nuestra Vitrina de Productos</h2>
                <div id="contenedor-productos" class="productos-grid">
                    <!-- Aquí se cargan las tarjetas de productos -->
                </div>
                <!-- Respaldo por si hay menú de texto únicamente -->
                <div id="menu-texto"
                    style="white-space: pre-wrap; font-size: 1.05rem; color: #444; line-height: 1.6; margin-top: 20px; display: none;">
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid #ddd; margin: 40px 0;">

            <h2 style="display: flex; align-items: center; gap: 10px;">⭐ Reseñas de la Comunidad</h2>
            <div id="contenedor-resenas" style="margin-top: 20px;"></div>

            <div id="form-nueva-resena" style="margin-top: 40px;"></div>
        </div>
    </div>

    <!-- Scripts Esenciales -->
    <script src="navbar.js"></script>

    <script>
        // Extraer 'correo' de la URL local (Ej: VisorLocal.html?correo=algo@algo.com)
        let correoActual = new URLSearchParams(window.location.search).get('correo');

        document.addEventListener('DOMContentLoaded', () => {
            if (!correoActual) {
                document.getElementById('loading').innerHTML = "<h2>No se especificó un local a visualizar.</h2><a href='Locales.html'>Explorar más</a>";
                return;
            }
            cargarDatosNativos();
            registrarVisita();

            // Configurar dark-mode general si está activo en el app.html padre (o localStorage)
            if (localStorage.getItem('theme') === 'dark' || document.body.classList.contains('dark-mode')) {
                document.body.classList.add('dark-mode');
            }
        });

        async function registrarVisita() {
            try {
                await fetch(API_URL + `/api/negocios/${encodeURIComponent(correoActual)}/visita`, { method: 'POST' });
            } catch (e) { console.error("Error al registrar visita", e); }
        }

        async function cargarDatosNativos() {
            try {
                const req = await fetch(API_URL + `/api/negocios/${encodeURIComponent(correoActual)}`);
                if (req.ok) {
                    const data = await req.json();
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('local-details').style.display = 'block';

                    document.getElementById('titulo-local').textContent = data.nombre;
                    document.getElementById('cat-local').textContent = data.categoria || 'Comercio General';
                    document.getElementById('dir-local').textContent = data.direccion || 'No disponible';
                    document.getElementById('tel-local').textContent = data.telefono || 'Sin teléfono';
                    document.getElementById('desc-local').textContent = data.descripcion || 'Este local no ha dejado una descripción aún en su perfil.';
                    
                    const h = data.horarios || {};
                    const dias = ['lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado', 'domingo'];
                    const diasLabels = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
                    
                    const hoyIdx = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
                    const hoyNombre = dias[hoyIdx];
                    const hoyInfo = h[hoyNombre] || { apertura: '09:00', cierre: '18:00', cerrado: false };
                    
                    document.getElementById('horario-local').textContent = hoyInfo.cerrado ? 'Cerrado hoy' : `Hoy: ${hoyInfo.apertura} - ${hoyInfo.cierre} ▾`;

                    // Llenar el detalle de la semana
                    const listaSemana = document.getElementById('lista-horarios-semana');
                    listaSemana.innerHTML = '';
                    dias.forEach((d, i) => {
                        const info = h[d] || { apertura: '09:00', cierre: '18:00', cerrado: false };
                        const texto = info.cerrado ? '<span style="color:#cc0000;">Cerrado</span>' : `${info.apertura} - ${info.cierre}`;
                        const esHoy = i === hoyIdx ? 'font-weight: bold; color: var(--primary-color);' : '';
                        listaSemana.innerHTML += `<div style="display: flex; justify-content: space-between; ${esHoy}"><span>${diasLabels[i]}</span> <span>${texto}</span></div>`;
                    });

                    if ((data.productos && data.productos.length > 0) || (data.menu && data.menu.trim() !== '')) {
                        document.getElementById('seccion-menu').style.display = 'block';

                        // Si hay productos con foto
                        if (data.productos && data.productos.length > 0) {
                            renderizarProductos(data.productos);
                        } else {
                            // Si solo hay texto viejo
                            document.getElementById('menu-texto').style.display = 'block';
                            document.getElementById('menu-texto').textContent = data.menu;
                        }
                    }

                    // Ofertas activas
                    if (data.ofertas && data.ofertas.length > 0) {
                        const hoy = new Date();
                        const ofertasActivas = data.ofertas.filter(o => o.activa && (!o.fechaFin || new Date(o.fechaFin) >= hoy));
                        if (ofertasActivas.length > 0) {
                            document.getElementById('seccion-ofertas').style.display = 'block';
                            document.getElementById('contenedor-ofertas').innerHTML = ofertasActivas.map(o => `
                                <div style="background: white; border: 1px solid #eee; border-radius: 16px; min-width: 250px; max-width: 300px; flex: 1; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.3s; cursor: default;" onmouseover="this.style.transform='translateY(-5px)'" onmouseout="this.style.transform='translateY(0)'">
                                    ${o.imagenUrl ? `<img src="${o.imagenUrl}" style="width: 100%; height: 140px; object-fit: cover; display: block;">` : ''}
                                    <div style="padding: 16px; position: relative;">
                                        ${o.descuento ? `<div style="position: absolute; top: -15px; right: 12px; background: #2ecc71; color: white; padding: 4px 12px; border-radius: 20px; font-weight: 800; font-size: 0.8rem; box-shadow: 0 4px 8px rgba(46, 204, 113, 0.3);">${o.descuento}</div>` : ''}
                                        <div style="font-weight: 800; font-size: 1.1rem; color: #333; margin-bottom: 8px;">${o.titulo}</div>
                                        ${o.descripcion ? `<div style="font-size: 0.9rem; color: #666; line-height: 1.4; margin-bottom: 12px;">${o.descripcion}</div>` : ''}
                                        <div style="display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #f9f9f9; padding-top: 10px;">
                                            <span style="font-size: 0.75rem; color: #999;">${o.fechaFin ? `📅 Expira: ${new Date(o.fechaFin).toLocaleDateString()}` : '⚡ Oferta activa'}</span>
                                            <button style="background: var(--primary-color); color: white; border: none; padding: 5px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; cursor: pointer;">Ver más</button>
                                        </div>
                                    </div>
                                </div>`).join('');
                        }
                    }

                    if (data.imagenUrl) document.getElementById('img-local').src = data.imagenUrl;

                    renderizarResenas(data.resenas);
                } else {
                    document.getElementById('loading').innerHTML = "<h2>El local solicitado no existe.</h2>";
                }
            } catch (e) {
                console.error(e);
                document.getElementById('loading').innerHTML = "<h2>Error de red al consultar el servidor.</h2>";
            }
        }

        function renderizarProductos(productos) {
            const container = document.getElementById('contenedor-productos');
            container.innerHTML = '';
            productos.forEach(p => {
                container.innerHTML += `
                    <div class="producto-card">
                        <img src="${p.imagenUrl}" class="producto-img" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&q=80&w=200'">
                        <div class="producto-info">
                            <div class="producto-nombre">${p.nombre}</div>
                            <div class="producto-precio">${p.precio}</div>
                        </div>
                    </div>
                `;
            });
        }

        function renderizarResenas(resenas = []) {
            const container = document.getElementById('contenedor-resenas');
            container.innerHTML = '';

            if (resenas.length === 0) {
                container.innerHTML = '<p style="color:#777; font-size:1.1rem; font-style:italic;">No hay reseñas aún. ¡Anímate a ser el primero!</p>';
            } else {
                // Ordenar por fecha (más nuevas primero)
                resenas.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

                resenas.forEach(r => {
                    let resp = '';
                    if (r.respuestaLocatario) {
                        resp = `<div class="resena-respuesta"><b>✅ Respuesta del Administrador:</b><br>${r.respuestaLocatario}</div>`;
                    }

                    let starsHTML = '';
                    for (let i = 1; i <= 5; i++) {
                        starsHTML += i <= (r.estrellas || 5) ? '★' : '☆';
                    }

                    container.innerHTML += `
                        <div class="resena-card">
                            <div class="star-display">${starsHTML}</div>
                            <strong style="color:var(--primary-color); font-size:1.1rem;">${r.usuarioNombre || 'Anónimo'}</strong> 
                            <span style="color:#888; font-size:0.85rem; margin-left:10px;">(${new Date(r.fecha).toLocaleDateString()})</span>
                            <p style="margin:12px 0; font-size:1rem; line-height:1.5;">"${r.texto}"</p>
                            ${resp}
                        </div>
                    `;
                });
            }

            const formContainer = document.getElementById('form-nueva-resena');
            let sesion = localStorage.getItem('tefti_sesion');
            let nombreGuardado = localStorage.getItem('tefti_nombre_usuario');

            if (sesion === 'invitado' || !sesion) {
                formContainer.innerHTML = '<div style="padding:20px; background:#ffeeba; border-left:5px solid #ffc107; color:#856404; font-size:1rem; border-radius:8px;"><strong>Acceso Restringido:</strong> Debes tener una sesión iniciada para escribir una reseña en este local.</div>';
            } else {
                formContainer.innerHTML = `
                    <div style="border-top: 1px solid #ddd; padding-top: 30px;">
                        <h3 style="margin-bottom:15px;">Deja tu opinión sincera:</h3>
                        
                        <div class="stars-container" id="selector-estrellas" style="margin-bottom: 20px;">
                            <span class="star" data-value="1" onclick="seleccionarEstrellas(1)">★</span>
                            <span class="star" data-value="2" onclick="seleccionarEstrellas(2)">★</span>
                            <span class="star" data-value="3" onclick="seleccionarEstrellas(3)">★</span>
                            <span class="star" data-value="4" onclick="seleccionarEstrellas(4)">★</span>
                            <span class="star" data-value="5" onclick="seleccionarEstrellas(5)">★</span>
                        </div>
                        <input type="hidden" id="valor-estrellas" value="5">

                        <textarea id="txt-nueva-resena" rows="4" placeholder="Ej: Me encantó su servicio, sin duda lo recomiendo..." style="width:100%; border:1px solid #ccc; padding:15px; border-radius:8px; margin-bottom: 15px; font-family:inherit; font-size:1rem;"></textarea>
                        <button class="btn-green" onclick="enviarResenaTurista()">Subir y Publicar Reseña</button>
                    </div>
                `;
                seleccionarEstrellas(5);
            }
        }

        function seleccionarEstrellas(n) {
            document.getElementById('valor-estrellas').value = n;
            const stars = document.querySelectorAll('.star');
            stars.forEach(s => {
                if (parseInt(s.getAttribute('data-value')) <= n) {
                    s.classList.add('selected');
                } else {
                    s.classList.remove('selected');
                }
            });
        }

        function toggleHorariosDetalle() {
            const detail = document.getElementById('horarios-detalle');
            detail.style.display = detail.style.display === 'none' ? 'block' : 'none';
        }

        async function enviarResenaTurista() {
            const txt = document.getElementById('txt-nueva-resena').value;
            const estrellas = document.getElementById('valor-estrellas').value;
            if (!txt || txt.trim() === '') return alert("No puedes enviar una reseña en blanco.");

            let usuario = localStorage.getItem('tefti_nombre_usuario');
            if (!usuario || usuario.trim() === '') usuario = 'Turista Verificado';

            try {
                const res = await fetch(API_URL + `/api/negocios/${correoActual}/resenas`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        usuarioNombre: usuario,
                        texto: txt.trim(),
                        estrellas: estrellas
                    })
                });

                if (res.ok) {
                    const localActualizado = await res.json();
                    renderizarResenas(localActualizado.resenas);
                } else {
                    alert("Se produjo un error al publicar tu reseña.");
                }
            } catch (e) {
                console.error(e);
                alert("Red inactiva o backend apagado.");
            }
        }
    </script>
</body>

</html>
